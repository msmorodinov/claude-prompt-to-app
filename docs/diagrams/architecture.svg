<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#6e7681"/>
    </marker>
    <marker id="arr-ret" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#484f58"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090c10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="url(#bg)"/>

  <!-- ═══ TERMINAL SECTION ═══ -->
  <rect x="24" y="20" width="210" height="180" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="129" y="44" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="1">TERMINAL</text>

  <rect x="48" y="60" width="162" height="56" rx="8" fill="#1c1424" stroke="#e8c46c" stroke-width="1.5"/>
  <text x="129" y="85" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">Claude Agent</text>
  <text x="129" y="104" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#8b949e" text-anchor="middle">claude-code CLI</text>

  <!-- SQLite -->
  <rect x="72" y="136" width="114" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="129" y="159" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#8b949e" text-anchor="middle">SQLite</text>

  <!-- ═══ SERVER SECTION ═══ -->
  <rect x="295" y="20" width="210" height="180" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="44" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="1">SERVER</text>

  <rect x="319" y="60" width="162" height="56" rx="8" fill="#151828" stroke="#a371f7" stroke-width="1.5"/>
  <text x="400" y="85" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">FastAPI</text>
  <text x="400" y="104" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#8b949e" text-anchor="middle">MCP tools + SSE</text>

  <!-- Port label -->
  <rect x="355" y="136" width="90" height="28" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="155" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#a371f7" text-anchor="middle">:4910</text>

  <!-- ═══ BROWSER SECTION ═══ -->
  <rect x="566" y="20" width="210" height="180" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="671" y="44" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="1">BROWSER</text>

  <rect x="590" y="60" width="162" height="56" rx="8" fill="#101d2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="671" y="85" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">React SPA</text>
  <text x="671" y="104" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#8b949e" text-anchor="middle">widget renderer</text>

  <!-- Port label -->
  <rect x="626" y="136" width="90" height="28" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="671" y="155" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#58a6ff" text-anchor="middle">:4920</text>

  <!-- ═══ ARROWS: Terminal ↔ Server ═══ -->
  <!-- Forward: show/ask -->
  <line x1="234" y1="78" x2="309" y2="78" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="271" y="72" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="9" fill="#79c0ff" text-anchor="middle">show()</text>

  <line x1="234" y1="92" x2="309" y2="92" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="271" y="106" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="9" fill="#79c0ff" text-anchor="middle">ask()</text>

  <!-- Return: answers -->
  <line x1="309" y1="108" x2="234" y2="108" stroke="#484f58" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-ret)"/>
  <text x="271" y="122" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="9" fill="#8b949e" text-anchor="middle">answers</text>

  <!-- ═══ ARROWS: Server ↔ Browser ═══ -->
  <!-- Forward: SSE -->
  <line x1="505" y1="82" x2="580" y2="82" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="542" y="76" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="9" fill="#79c0ff" text-anchor="middle">SSE</text>

  <!-- Return: POST -->
  <line x1="580" y1="100" x2="505" y2="100" stroke="#484f58" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-ret)"/>
  <text x="542" y="114" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="9" fill="#8b949e" text-anchor="middle">POST</text>
</svg>
