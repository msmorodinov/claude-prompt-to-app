<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#6e7681"/>
    </marker>
    <marker id="arr-gold" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#e8c46c"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#3fb950"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090c10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" rx="16" fill="url(#bg)"/>

  <!-- ═══ AGENT BOX (top center) ═══ -->
  <rect x="280" y="24" width="240" height="72" rx="12" fill="#1c1424" stroke="#e8c46c" stroke-width="2"/>
  <text x="400" y="56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#e8c46c" text-anchor="middle">Claude Agent</text>
  <text x="400" y="78" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#8b949e" text-anchor="middle">your prompt = entire app logic</text>

  <!-- ═══ LEFT BRANCH: show() ═══ -->

  <!-- Arrow down-left from Agent -->
  <path d="M 330 96 L 180 168" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- show() label -->
  <rect x="195" y="112" width="84" height="24" rx="12" fill="#0d2818" stroke="#238636" stroke-width="0.75"/>
  <text x="237" y="128" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="600">show()</text>

  <!-- Display box -->
  <rect x="56" y="176" width="220" height="64" rx="10" fill="#101d2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="166" y="204" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">Browser displays</text>
  <text x="166" y="224" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">tables, charts, results, text</text>

  <!-- Fire & forget note -->
  <text x="166" y="264" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#3fb950" text-anchor="middle" font-style="italic">&#10003; fire &amp; forget</text>
  <text x="166" y="282" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">agent continues immediately</text>

  <!-- ═══ RIGHT BRANCH: ask() ═══ -->

  <!-- Arrow down-right from Agent -->
  <path d="M 470 96 L 620 168" stroke="#e8c46c" stroke-width="1.5" fill="none" marker-end="url(#arr-gold)"/>

  <!-- ask() label -->
  <rect x="517" y="112" width="76" height="24" rx="12" fill="#2d1f00" stroke="#e8c46c" stroke-width="0.75"/>
  <text x="555" y="128" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="12" fill="#e8c46c" text-anchor="middle" font-weight="600">ask()</text>

  <!-- Form box -->
  <rect x="524" y="176" width="220" height="64" rx="10" fill="#101d2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="634" y="204" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e6edf3" text-anchor="middle">Browser shows form</text>
  <text x="634" y="224" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">selects, inputs, sliders, tags</text>

  <!-- Arrow down: user submits -->
  <line x1="634" y1="240" x2="634" y2="292" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="654" y="272" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="start">user submits</text>

  <!-- Answer box -->
  <rect x="524" y="300" width="220" height="52" rx="10" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="634" y="322" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="12" fill="#a371f7" text-anchor="middle">POST /answers</text>
  <text x="634" y="340" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">unblocks server handler</text>

  <!-- Return arrow: curved path back to Agent -->
  <path d="M 524 326 C 420 326, 360 260, 360 96" stroke="#e8c46c" stroke-width="1.5" stroke-dasharray="6 3" fill="none" marker-end="url(#arr-gold)"/>

  <!-- Return label -->
  <rect x="350" y="192" width="116" height="22" rx="11" fill="#2d1f00" stroke="#e8c46c" stroke-width="0.75"/>
  <text x="408" y="207" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#e8c46c" text-anchor="middle" font-weight="500">answers return</text>

  <!-- Bottom label -->
  <rect x="280" y="392" width="240" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="413" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">agent loop continues &#8635;</text>
</svg>
