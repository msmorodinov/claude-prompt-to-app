<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" fill="none">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#6e7681"/>
    </marker>
    <marker id="arr-gold" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#e8c46c"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0.5, 10 3.5, 0 6.5" fill="#a371f7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090c10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" rx="16" fill="url(#bg)"/>

  <!-- ═══ HEADER BOXES ═══ -->
  <rect x="52" y="20" width="150" height="44" rx="8" fill="#1c1424" stroke="#e8c46c" stroke-width="1.5"/>
  <text x="127" y="47" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e8c46c" text-anchor="middle">Agent</text>

  <rect x="325" y="20" width="150" height="44" rx="8" fill="#151828" stroke="#a371f7" stroke-width="1.5"/>
  <text x="400" y="47" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#a371f7" text-anchor="middle">Server</text>

  <rect x="598" y="20" width="150" height="44" rx="8" fill="#101d2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="673" y="47" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#58a6ff" text-anchor="middle">Browser</text>

  <!-- ═══ LIFELINES ═══ -->
  <line x1="127" y1="64" x2="127" y2="520" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="400" y1="64" x2="400" y2="520" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="673" y1="64" x2="673" y2="520" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ═══ STEP 1: show(data_table) ═══ -->
  <line x1="137" y1="100" x2="390" y2="100" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="263" y="93" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="500">show(data_table)</text>

  <!-- STEP 2: SSE to browser -->
  <line x1="410" y1="128" x2="663" y2="128" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="536" y="121" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#3fb950" text-anchor="middle">SSE: render table</text>

  <!-- Fire & forget badge -->
  <rect x="48" y="138" width="110" height="22" rx="11" fill="#0d2818" stroke="#238636" stroke-width="0.75"/>
  <text x="103" y="153" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="500">fire &amp; forget &#10003;</text>

  <!-- ═══ DIVIDER ═══ -->
  <line x1="40" y1="180" x2="760" y2="180" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- ═══ STEP 3: ask(questions) ═══ -->
  <line x1="137" y1="210" x2="390" y2="210" stroke="#e8c46c" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <text x="263" y="203" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#e8c46c" text-anchor="middle" font-weight="500">ask(questions)</text>

  <!-- STEP 4: SSE form to browser -->
  <line x1="410" y1="240" x2="663" y2="240" stroke="#e8c46c" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <text x="536" y="233" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#e8c46c" text-anchor="middle">SSE: render form</text>

  <!-- STEP 5: await Event() -->
  <rect x="350" y="264" width="100" height="54" rx="6" fill="#2d1f00" stroke="#e8c46c" stroke-width="1"/>
  <text x="400" y="284" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#e8c46c" text-anchor="middle" font-weight="500">await</text>
  <text x="400" y="300" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#e8c46c" text-anchor="middle" font-weight="500">Event()</text>

  <!-- STEP 6: User fills form (self-arrow on browser) -->
  <path d="M 683 280 C 720 280, 720 320, 683 320" stroke="#58a6ff" stroke-width="1" fill="none"/>
  <circle cx="683" cy="320" r="3" fill="#58a6ff"/>
  <text x="732" y="304" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="start">user fills</text>
  <text x="732" y="318" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="start">form</text>

  <!-- STEP 7: POST /answers -->
  <line x1="663" y1="352" x2="410" y2="352" stroke="#a371f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="536" y="345" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#a371f7" text-anchor="middle" font-weight="500">POST /answers</text>

  <!-- STEP 8: event.set() -->
  <rect x="355" y="370" width="90" height="26" rx="6" fill="#0d2818" stroke="#238636" stroke-width="0.75"/>
  <text x="400" y="388" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="500">event.set()</text>

  <!-- STEP 9: return answers -->
  <line x1="390" y1="418" x2="137" y2="418" stroke="#e8c46c" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-gold)"/>
  <text x="263" y="411" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="11" fill="#e8c46c" text-anchor="middle">return answers</text>

  <!-- STEP 10: continues reasoning -->
  <rect x="48" y="440" width="158" height="24" rx="6" fill="#1c1424" stroke="#e8c46c" stroke-width="0.75"/>
  <text x="127" y="457" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#e8c46c" text-anchor="middle" font-weight="500">continues reasoning...</text>

  <!-- ═══ FOOTER BOXES ═══ -->
  <rect x="52" y="496" width="150" height="44" rx="8" fill="#1c1424" stroke="#e8c46c" stroke-width="1.5"/>
  <text x="127" y="523" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e8c46c" text-anchor="middle">Agent</text>

  <rect x="325" y="496" width="150" height="44" rx="8" fill="#151828" stroke="#a371f7" stroke-width="1.5"/>
  <text x="400" y="523" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#a371f7" text-anchor="middle">Server</text>

  <rect x="598" y="496" width="150" height="44" rx="8" fill="#101d2e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="673" y="523" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#58a6ff" text-anchor="middle">Browser</text>
</svg>
