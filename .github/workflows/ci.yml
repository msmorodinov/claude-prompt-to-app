name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend
        run: pip install -r backend/requirements.txt

      - name: Install root deps (Playwright, wait-on)
        run: npm ci

      - name: Install frontend
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Frontend tests
        run: cd frontend && npx vitest run

      - name: Backend tests
        run: python -m pytest backend/tests/test_session.py --noconftest -v

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start mock server
        run: python -m e2e.fixtures.mock_server --port 8000 &

      - name: Start frontend
        run: cd frontend && npm run dev -- --port 5174 &

      - name: Wait for servers
        run: npx wait-on http://localhost:5174 http://localhost:8000/health --timeout 30000

      - name: E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
