name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend
        run: pip install -r backend/requirements.txt

      - name: Install root deps (Playwright, wait-on)
        run: npm ci

      - name: Install frontend
        run: cd frontend && npm ci

      - name: TypeScript check (source + tests)
        run: cd frontend && npx tsc -b --noEmit

      - name: Frontend tests
        run: |
          cd frontend && npx vitest run --reporter=verbose 2>&1
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "::error::Vitest tests failed with exit code $exit_code"
            exit $exit_code
          fi

      - name: Backend tests
        run: python -m pytest backend/tests/test_session.py --noconftest -v

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start mock server
        run: |
          nohup python -m e2e.fixtures.mock_server --port 4910 > /tmp/mock-server.log 2>&1 &
          echo $! > /tmp/mock-server.pid

      - name: Start frontend
        run: |
          cd frontend && nohup npm run dev -- --port 4921 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for servers
        run: |
          npx wait-on http-get://localhost:4910/health http://localhost:4921 --timeout 30000 || {
            echo "=== Mock server log ===" && cat /tmp/mock-server.log
            echo "=== Frontend log ===" && cat /tmp/frontend.log
            exit 1
          }

      - name: E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
