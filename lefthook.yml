pre-commit:
  parallel: true
  commands:
    tsc:
      root: frontend/
      run: npx tsc -b --noEmit
      glob: "*.{ts,tsx}"
    vitest:
      root: frontend/
      run: npx vitest run --reporter=verbose
      glob: "*.{ts,tsx}"
    pytest:
      run: python3 -m pytest backend/tests/test_session.py --noconftest -v
      glob: "*.py"
